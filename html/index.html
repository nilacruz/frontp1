<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="main.css">
    <title>Pokemon</title>
</head>
<body>
    <nav class="navbar bg-danger">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">Pokemon search</span>
        </div>
    </nav>

    <div class="text-center mt-4">
        <h1>Bienvenido</h1>
        <h2>Pokeapi</h2>
    </div>

    <div id="pokemon-or-number" class="container mt-4">
        <div class="text-center">
            <label>Indica el nombre o id del pokemon</label>
            <input id="pokemon" type="text" class="form-control text-center">
            <small>id max = 200</small>
            <br>
            <button class="btn btn-warning mt-2" onclick="baseURL()">buscar</button>
        </div>
    </div>

    <div id="poke-table" class="container mb-4 mt-4">
        <div class="row">
            <div class="col-12 text-center mb-4">
                <img src="" alt="imagen:???" id="image">
            </div>

            <div class="col-6 text-center">
                <p>Nombre</p>
            </div>
            <div class="col-6 text-center">
                <p id="parameterValue0"></p>
            </div>

            <div class="col-6 text-center">
                <p>ID</p>
            </div>
            <div class="col-6 text-center">
                <p id="parameterValue1"></p>
            </div>

            <div class="col-6 text-center">
                <p>Experiencia</p>
            </div>
            <div class="col-6 text-center">
                <p id="parameterValue2"></p>
            </div>

            <div class="col-6 text-center">
                <p>Altura</p>
            </div>
            <div class="col-6 text-center">
                <p id="parameterValue3"></p>
            </div>
        </div>
    </div>

    <script src="../js/main.js"></script>
   <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</body>

</html>
